<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spaceman Crash Game</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>🚀 SPACEMAN CRASH GAME</h1>
            <div class="domain-badge">https://www.barackgift.store</div>
        </div>
        
        <div class="game-area">
            <div class="rocket-area">
                <div class="rocket" id="rocket">
                    🚀
                </div>
                <div class="flight-path"></div>
            </div>
            
            <div class="multiplier-display">
                <div class="multiplier-value" id="multiplier">1.00x</div>
                <div class="multiplier-speed" id="speed">Speed: Normal</div>
            </div>
            
            <div class="countdown-overlay" id="countdownOverlay" style="display: none;">
                <div class="countdown-number" id="countdownNumber"></div>
                <div class="countdown-text">Next Round Starts In</div>
            </div>
        </div>
        
        <div class="game-info">
            <div class="round-info">
                <h3>Round History</h3>
                <div class="history-list" id="historyList">
                    <div class="loading">Loading history...</div>
                </div>
            </div>
            
            <div class="current-round-info">
                <h3>Current Round</h3>
                <div id="currentRoundInfo">
                    <p>Round ID: <span id="roundId">-</span></p>
                    <p>Target: <span id="targetMultiplier">-</span>x</p>
                </div>
            </div>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
